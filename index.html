<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deliverance For Me</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      color: #e0d6c8;
      overflow-x: hidden;
      transition: background 0.8s ease, color 0.8s ease;
    }

    body.light-mode {
      background: #f0ebe3;
      color: #2a2520;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      text-align: center;
      opacity: 0.9;
    }

    .subtitle {
      font-size: clamp(0.8rem, 1.5vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      text-align: center;
      opacity: 0.5;
    }

    .reveal-container {
      position: relative;
      width: 90vw;
      max-width: 1200px;
      aspect-ratio: 2816 / 1536;
      cursor: none;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      transition: box-shadow 0.8s ease;
    }

    body.light-mode .reveal-container {
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .reveal-container img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .img-happy {
      z-index: 1;
    }

    .img-depressed {
      z-index: 2;
      --mx: 50%;
      --my: 50%;
      --radius: 0px;
      -webkit-mask-image: radial-gradient(
        circle var(--radius) at var(--mx) var(--my),
        transparent 0%,
        transparent 80%,
        black 100%
      );
      mask-image: radial-gradient(
        circle var(--radius) at var(--mx) var(--my),
        transparent 0%,
        transparent 80%,
        black 100%
      );
    }

    .custom-cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 220, 150, 0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.3s ease, width 0.4s ease, height 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      box-shadow: 0 0 15px rgba(255, 220, 150, 0.3);
    }

    .custom-cursor.active {
      width: 200px;
      height: 200px;
      border-color: rgba(255, 220, 150, 0.6);
      opacity: 1;
    }

    .custom-cursor.visible {
      opacity: 1;
    }

    body.light-mode .custom-cursor {
      border-color: rgba(30, 20, 50, 0.6);
      box-shadow: 0 0 15px rgba(30, 20, 50, 0.2);
    }

    body.light-mode .custom-cursor.active {
      border-color: rgba(30, 20, 50, 0.4);
    }

    .toggle-btn {
      margin-top: 1.5rem;
      padding: 0.7rem 2rem;
      font-family: 'Georgia', serif;
      font-size: clamp(0.8rem, 1.3vw, 1rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid rgba(224, 214, 200, 0.3);
      border-radius: 50px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      z-index: 50;
    }

    .toggle-btn:hover {
      border-color: rgba(224, 214, 200, 0.7);
      background: rgba(224, 214, 200, 0.1);
    }

    body.light-mode .toggle-btn {
      border-color: rgba(42, 37, 32, 0.3);
    }

    body.light-mode .toggle-btn:hover {
      border-color: rgba(42, 37, 32, 0.7);
      background: rgba(42, 37, 32, 0.08);
    }

    .hint {
      margin-top: 1.5rem;
      font-size: clamp(0.7rem, 1.2vw, 0.9rem);
      letter-spacing: 0.2em;
      opacity: 0.4;
      text-align: center;
      transition: opacity 0.6s ease;
    }

    .hint.hidden {
      opacity: 0;
    }

    .touch-ring {
      position: fixed;
      width: 160px;
      height: 160px;
      border: 2px solid rgba(255, 220, 150, 0.6);
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.5s ease;
      box-shadow: 0 0 20px rgba(255, 220, 150, 0.25);
    }

    .touch-ring.visible {
      opacity: 1;
    }

    .touch-ring.fading {
      transition: opacity 1.5s ease;
      opacity: 0;
    }

    body.light-mode .touch-ring {
      border-color: rgba(30, 20, 50, 0.4);
      box-shadow: 0 0 20px rgba(30, 20, 50, 0.15);
    }

    /* Contact form overlay */
    .contact-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      overflow: hidden;
    }

    .contact-backdrop {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(15, 12, 10, 0.95);
      transform: translate(-50%, -50%);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                  height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light-mode .contact-backdrop {
      background: rgba(240, 235, 227, 0.95);
    }

    .contact-overlay.active .contact-backdrop {
      width: 250%;
      height: 250%;
    }

    .contact-overlay.active {
      pointer-events: auto;
    }

    .contact-form {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 440px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease 0.4s, transform 0.5s ease 0.4s;
    }

    .contact-overlay.active .contact-form {
      opacity: 1;
      transform: translateY(0);
    }

    .contact-form h2 {
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
      text-align: center;
    }

    .contact-form p {
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      text-align: center;
      opacity: 0.5;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      color: #e0d6c8;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(224, 214, 200, 0.15);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.3s ease, background 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: rgba(224, 214, 200, 0.4);
      background: rgba(255, 255, 255, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    body.light-mode .form-group input,
    body.light-mode .form-group textarea {
      color: #2a2520;
      background: rgba(0, 0, 0, 0.04);
      border-color: rgba(42, 37, 32, 0.15);
    }

    body.light-mode .form-group input:focus,
    body.light-mode .form-group textarea:focus {
      border-color: rgba(42, 37, 32, 0.35);
      background: rgba(0, 0, 0, 0.07);
    }

    .form-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.2rem;
    }

    .btn-submit {
      flex: 1;
      padding: 0.7rem 1.5rem;
      font-family: 'Georgia', serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      background: rgba(255, 220, 150, 0.2);
      color: #e0d6c8;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn-submit:hover {
      background: rgba(255, 220, 150, 0.35);
    }

    body.light-mode .btn-submit {
      background: rgba(42, 37, 32, 0.12);
      color: #2a2520;
    }

    body.light-mode .btn-submit:hover {
      background: rgba(42, 37, 32, 0.22);
    }

    .btn-back {
      padding: 0.7rem 1.5rem;
      font-family: 'Georgia', serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid rgba(224, 214, 200, 0.2);
      border-radius: 50px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      transition: border-color 0.3s ease;
    }

    .btn-back:hover {
      border-color: rgba(224, 214, 200, 0.5);
    }

    body.light-mode .btn-back {
      border-color: rgba(42, 37, 32, 0.2);
    }

    body.light-mode .btn-back:hover {
      border-color: rgba(42, 37, 32, 0.5);
    }

    .form-error {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: rgba(255, 120, 120, 0.9);
      text-align: center;
      min-height: 1.2em;
      letter-spacing: 0.05em;
    }

    body.light-mode .form-error {
      color: rgba(180, 40, 40, 0.85);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Success message */
    .form-success {
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80%;
      transform: translate(-50%, -50%) translateY(10px);
      pointer-events: none;
    }

    .form-success.visible {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0);
      pointer-events: auto;
    }

    .form-success h2 {
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .form-success p {
      font-size: clamp(0.8rem, 1.2vw, 1rem);
      opacity: 0.6;
    }

    .buttons-row {
      display: flex;
      gap: 0.8rem;
      margin-top: 0.8rem;
      margin-bottom: 2.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .help-btn {
      margin-top: 1.5rem;
      padding: 0.7rem 2rem;
      font-family: 'Georgia', serif;
      font-size: clamp(0.8rem, 1.3vw, 1rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid rgba(255, 220, 150, 0.4);
      border-radius: 50px;
      background: rgba(255, 220, 150, 0.1);
      color: inherit;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      z-index: 50;
    }

    .help-btn:hover {
      border-color: rgba(255, 220, 150, 0.7);
      background: rgba(255, 220, 150, 0.2);
    }

    body.light-mode .help-btn {
      border-color: rgba(42, 37, 32, 0.4);
      background: rgba(42, 37, 32, 0.08);
    }

    body.light-mode .help-btn:hover {
      border-color: rgba(42, 37, 32, 0.7);
      background: rgba(42, 37, 32, 0.15);
    }

    @media (hover: none) and (pointer: coarse) {
      .reveal-container {
        cursor: default;
      }

      .custom-cursor {
        display: none;
      }
    }
  </style>
</head>
<body>
  <h1>Deliverance For Me</h1>
  <p class="subtitle">Move your light to reveal the truth</p>

  <div class="reveal-container" id="revealContainer">
    <img src="images/happy.png" alt="Delivered - walking in light" class="img-happy">
    <img src="images/depressed.png" alt="Bound - walking in darkness" class="img-depressed" id="topImage">

    <div class="contact-overlay" id="contactOverlay">
      <div class="contact-backdrop"></div>
      <div class="contact-form" id="contactForm">
        <h2>Reach Out</h2>
        <p>You are not alone. Tell us how we can help.</p>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your email" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What's on your heart..." required></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-back" id="btnBack">Back</button>
          <button type="button" class="btn-submit" id="btnSubmit">Send</button>
        </div>
        <p class="form-error" id="formError"></p>
      </div>
      <div class="form-success" id="formSuccess">
        <h2>Thank You</h2>
        <p>Your message has been received. Someone will be in touch soon.</p>
        <div class="form-actions" style="justify-content: center; margin-top: 1.2rem;">
          <button type="button" class="btn-back" id="btnSuccessBack">Back</button>
        </div>
      </div>
    </div>
  </div>

  <p class="hint" id="hint">Hover over the image</p>

  <div class="buttons-row">
    <button class="toggle-btn" id="toggleBtn">Step into the light</button>
    <button class="help-btn" id="helpBtn">Get Help!</button>
  </div>

  <div class="custom-cursor" id="cursor"></div>
  <div class="touch-ring" id="touchRing"></div>

  <script>
    const container = document.getElementById('revealContainer');
    const imgHappy = container.querySelector('.img-happy');
    const imgDepressed = container.querySelector('.img-depressed');
    const cursor = document.getElementById('cursor');
    const hint = document.getElementById('hint');
    const toggleBtn = document.getElementById('toggleBtn');
    const subtitle = document.querySelector('.subtitle');

    const touchRing = document.getElementById('touchRing');

    const REVEAL_RADIUS = 120;
    const TOUCH_FADE_MS = 1500;
    let isInside = false;
    let isDarkMode = true;
    let isTouchDevice = false;
    let touchFadeTimer = null;
    let touchFadeRAF = null;
    let formOpen = false;

    // The "top" image is always the one with the mask applied
    function getTopImage() {
      return isDarkMode ? imgDepressed : imgHappy;
    }

    function applyMask(img) {
      img.style.cssText = `
        z-index: 2;
        --mx: 50%;
        --my: 50%;
        --radius: 0px;
        -webkit-mask-image: radial-gradient(circle var(--radius) at var(--mx) var(--my), transparent 0%, transparent 80%, black 100%);
        mask-image: radial-gradient(circle var(--radius) at var(--mx) var(--my), transparent 0%, transparent 80%, black 100%);
      `;
    }

    function clearMask(img) {
      img.style.cssText = 'z-index: 1;';
    }

    function updateReveal(clientX, clientY) {
      const rect = container.getBoundingClientRect();
      const x = ((clientX - rect.left) / rect.width) * 100;
      const y = ((clientY - rect.top) / rect.height) * 100;
      const top = getTopImage();

      top.style.setProperty('--mx', x + '%');
      top.style.setProperty('--my', y + '%');

      cursor.style.left = clientX + 'px';
      cursor.style.top = clientY + 'px';
    }

    // Toggle between dark and light mode
    toggleBtn.addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      document.body.classList.toggle('light-mode', !isDarkMode);

      if (isDarkMode) {
        // Dark mode: depressed on top, reveal happy
        applyMask(imgDepressed);
        clearMask(imgHappy);
        toggleBtn.textContent = 'Step into the light';
        subtitle.textContent = 'Move your light to reveal the truth';
      } else {
        // Light mode: happy on top, reveal depressed
        applyMask(imgHappy);
        clearMask(imgDepressed);
        toggleBtn.textContent = 'Return to darkness';
        subtitle.textContent = 'Move your shadow to reveal the past';
      }

      // Reset hint with device-appropriate text
      hint.classList.remove('hidden');
      if (isTouchDevice) {
        hint.textContent = 'Touch and drag to reveal';
      } else {
        hint.textContent = 'Hover over the image';
      }
    });

    container.addEventListener('mouseenter', () => {
      if (formOpen) return;
      isInside = true;
      getTopImage().style.setProperty('--radius', REVEAL_RADIUS + 'px');
      cursor.classList.add('active');
      hint.classList.add('hidden');
    });

    container.addEventListener('mousemove', (e) => {
      if (formOpen || !isInside) return;
      updateReveal(e.clientX, e.clientY);
    });

    container.addEventListener('mouseleave', () => {
      if (formOpen) return;
      isInside = false;
      getTopImage().style.setProperty('--radius', '0px');
      cursor.classList.remove('active');
      cursor.classList.remove('visible');
    });

    // Show cursor when it enters the page
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      if (!cursor.classList.contains('visible') && !isInside) {
        cursor.classList.add('visible');
      }
    });

    // Detect touch device and update hint
    function setTouchHint() {
      if (!isTouchDevice) {
        isTouchDevice = true;
        hint.textContent = 'Touch and drag to reveal';
      }
    }

    // Animate the radius shrinking over time for a smooth fade
    function animateFadeOut() {
      const top = getTopImage();
      const startRadius = REVEAL_RADIUS;
      const startTime = performance.now();

      touchRing.classList.remove('visible');
      touchRing.classList.add('fading');

      function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / TOUCH_FADE_MS, 1);
        // Ease out curve
        const eased = 1 - (1 - progress) * (1 - progress);
        const currentRadius = startRadius * (1 - eased);

        top.style.setProperty('--radius', currentRadius + 'px');

        if (progress < 1) {
          touchFadeRAF = requestAnimationFrame(step);
        } else {
          top.style.setProperty('--radius', '0px');
          touchRing.classList.remove('fading');
        }
      }

      touchFadeRAF = requestAnimationFrame(step);
    }

    function cancelFade() {
      if (touchFadeRAF) {
        cancelAnimationFrame(touchFadeRAF);
        touchFadeRAF = null;
      }
      touchRing.classList.remove('fading');
    }

    // Touch support
    container.addEventListener('touchstart', (e) => {
      if (formOpen) return;
      e.preventDefault();
      setTouchHint();
      cancelFade();
      isInside = true;
      getTopImage().style.setProperty('--radius', REVEAL_RADIUS + 'px');
      hint.classList.add('hidden');

      const touch = e.touches[0];
      updateReveal(touch.clientX, touch.clientY);

      touchRing.style.left = touch.clientX + 'px';
      touchRing.style.top = touch.clientY + 'px';
      touchRing.classList.add('visible');
    });

    container.addEventListener('touchmove', (e) => {
      if (formOpen) return;
      e.preventDefault();
      if (!isInside) return;
      const touch = e.touches[0];
      updateReveal(touch.clientX, touch.clientY);

      touchRing.style.left = touch.clientX + 'px';
      touchRing.style.top = touch.clientY + 'px';
    });

    container.addEventListener('touchend', () => {
      isInside = false;
      animateFadeOut();
    });

    // Contact form
    const contactOverlay = document.getElementById('contactOverlay');
    const contactForm = document.getElementById('contactForm');
    const formSuccess = document.getElementById('formSuccess');
    const helpBtn = document.getElementById('helpBtn');
    const btnBack = document.getElementById('btnBack');
    const btnSuccessBack = document.getElementById('btnSuccessBack');
    const btnSubmit = document.getElementById('btnSubmit');

    function openForm() {
      formOpen = true;
      // Reset any active reveal
      isInside = false;
      getTopImage().style.setProperty('--radius', '0px');
      cursor.classList.remove('active');
      cursor.classList.remove('visible');
      cancelFade();

      contactOverlay.classList.add('active');
      contactForm.style.display = '';
      contactForm.style.opacity = '';
      contactForm.style.transform = '';
      formSuccess.classList.remove('visible');
      container.style.cursor = 'default';
    }

    function closeForm() {
      formOpen = false;
      contactOverlay.classList.remove('active');
      formSuccess.classList.remove('visible');
      container.style.cursor = '';
      // Reset form fields
      contactOverlay.querySelectorAll('input, textarea').forEach(el => el.value = '');
    }

    helpBtn.addEventListener('click', openForm);
    btnBack.addEventListener('click', closeForm);
    btnSuccessBack.addEventListener('click', closeForm);

    const formError = document.getElementById('formError');

    btnSubmit.addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();

      formError.textContent = '';

      if (!name || !email || !message) {
        formError.textContent = 'Please fill in all fields.';
        return;
      }

      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Sending...';

      try {
        const res = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Something went wrong.');
        }

        // Hide form, show success
        contactForm.style.opacity = '0';
        contactForm.style.transform = 'translateY(-10px)';
        setTimeout(() => {
          contactForm.style.display = 'none';
          formSuccess.classList.add('visible');
        }, 400);
      } catch (err) {
        formError.textContent = err.message || 'Failed to send. Please try again.';
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Send';
      }
    });

  </script>
</body>
</html>
